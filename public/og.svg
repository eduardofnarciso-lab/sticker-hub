<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg-glow" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#0B1020" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="title-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#60A5FA"/>
    </linearGradient>
    <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#60A5FA"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0B1020"/>
  <rect width="1200" height="630" fill="url(#bg-glow)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

  <!-- Logo badge -->
  <rect x="76" y="72" width="56" height="56" rx="14" fill="url(#logo-grad)"/>
  <text x="104" y="112" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="900" fill="white" text-anchor="middle">F</text>

  <!-- Brand name -->
  <text x="148" y="96" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#FFFFFF">Figu</text>
  <text x="148" y="120" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#A1A1AA">Marketplace de figurinhas avulsas</text>

  <!-- Main headline -->
  <text x="76" y="270" font-family="system-ui, -apple-system, sans-serif" font-size="58" font-weight="900" fill="#FFFFFF" letter-spacing="-1">Complete seu álbum</text>
  <text x="76" y="340" font-family="system-ui, -apple-system, sans-serif" font-size="58" font-weight="900" fill="url(#title-grad)" letter-spacing="-1">sem repetidas.</text>

  <!-- Subtitle -->
  <text x="76" y="400" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#A1A1AA">Compre, venda e encontre figurinhas avulsas rapidamente.</text>

  <!-- Stats row -->
  <!-- Stat 1 -->
  <rect x="76" y="460" width="220" height="80" rx="12" fill="rgba(96,165,250,0.08)" stroke="rgba(96,165,250,0.2)" stroke-width="1"/>
  <text x="186" y="497" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="900" fill="#60A5FA" text-anchor="middle">+10.000</text>
  <text x="186" y="522" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#A1A1AA" text-anchor="middle">buscas realizadas</text>

  <!-- Stat 2 -->
  <rect x="316" y="460" width="220" height="80" rx="12" fill="rgba(139,92,246,0.08)" stroke="rgba(139,92,246,0.2)" stroke-width="1"/>
  <text x="426" y="497" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="900" fill="#8B5CF6" text-anchor="middle">+50.000</text>
  <text x="426" y="522" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#A1A1AA" text-anchor="middle">figurinhas cadastradas</text>

  <!-- Stat 3 -->
  <rect x="556" y="460" width="220" height="80" rx="12" fill="rgba(34,211,238,0.08)" stroke="rgba(34,211,238,0.2)" stroke-width="1"/>
  <text x="666" y="497" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="900" fill="#22D3EE" text-anchor="middle">+1.000</text>
  <text x="666" y="522" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#A1A1AA" text-anchor="middle">colecionadores ativos</text>

  <!-- CTA pill (right side) -->
  <rect x="860" y="270" width="264" height="170" rx="20" fill="rgba(139,92,246,0.12)" stroke="rgba(139,92,246,0.25)" stroke-width="1"/>
  <text x="992" y="320" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#A78BFA" text-anchor="middle">A PARTIR DE</text>
  <text x="992" y="375" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="900" fill="#FFFFFF" text-anchor="middle">R$20</text>
  <text x="992" y="408" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#71717A" text-anchor="middle">/mês</text>

  <!-- URL footer -->
  <text x="76" y="590" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#52525B">figu.spiritrelay.com/planos</text>
</svg>
