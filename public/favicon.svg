<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="cg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#7C3AED"/>
      <stop offset="55%"  stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#130d2a"/>
      <stop offset="100%" stop-color="#0B1020"/>
    </linearGradient>
  </defs>

  <!-- App icon background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Back card — rotated +8deg, offset bottom-right -->
  <g transform="translate(35, 35) rotate(8)">
    <rect x="-13" y="-17" width="26" height="34" rx="6"
      fill="rgba(96,165,250,0.06)"
      stroke="url(#cg)" stroke-width="1.4" stroke-opacity="0.55"/>
  </g>

  <!-- Front card -->
  <g transform="translate(30, 31)">
    <rect x="-13" y="-17" width="26" height="34" rx="6"
      fill="rgba(124,58,237,0.09)"
      stroke="url(#cg)" stroke-width="1.8"/>

    <!-- Diagonal shine line (bottom-left → center-right) -->
    <line x1="-5" y1="9" x2="7" y2="-1"
      stroke="url(#cg)" stroke-width="1.1" stroke-linecap="round" stroke-opacity="0.55"/>

    <!-- Large 4-point sparkle, center of card -->
    <path d="M0,-8.5 L1.7,-1.7 L8.5,0 L1.7,1.7 L0,8.5 L-1.7,1.7 L-8.5,0 L-1.7,-1.7 Z"
      fill="url(#cg)" fill-opacity="0.85"/>

    <!-- Small 4-point sparkle, top-left of card -->
    <g transform="translate(-5.5,-8)">
      <path d="M0,-3 L0.6,-0.6 L3,0 L0.6,0.6 L0,3 L-0.6,0.6 L-3,0 L-0.6,-0.6 Z"
        fill="url(#cg)" fill-opacity="0.8"/>
    </g>
  </g>

  <!-- Outer sparkle — top-left of card stack -->
  <g transform="translate(14, 16)">
    <path d="M0,-4.5 L0.9,-0.9 L4.5,0 L0.9,0.9 L0,4.5 L-0.9,0.9 L-4.5,0 L-0.9,-0.9 Z"
      fill="url(#cg)" fill-opacity="0.9"/>
  </g>

  <!-- Outer sparkle — bottom-right -->
  <g transform="translate(50, 48)">
    <path d="M0,-3 L0.6,-0.6 L3,0 L0.6,0.6 L0,3 L-0.6,0.6 L-3,0 L-0.6,-0.6 Z"
      fill="url(#cg)" fill-opacity="0.75"/>
  </g>
</svg>
